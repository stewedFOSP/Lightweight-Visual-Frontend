<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightweight Visual Frontend</title>
    <meta
      name="description"
      content="Spatial attention visualizations from a lightweight visual frontend for audio-visual target speaker extraction."
    />
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: rgba(255, 252, 245, 0.88);
        --text: #1e1a17;
        --muted: #5d534d;
        --accent: #ba4a28;
        --line: rgba(30, 26, 23, 0.12);
        --shadow: 0 24px 60px rgba(52, 35, 24, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(186, 74, 40, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(150, 124, 88, 0.22), transparent 28%),
          linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      }

      main {
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0 64px;
      }

      .hero {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero-top {
        padding: 20px 24px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        font: 600 0.78rem/1.1 Arial, Helvetica, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .hero-body {
        padding: 40px 24px 32px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.8rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      .lead {
        margin: 16px 0 0;
        max-width: 44rem;
        color: var(--muted);
        font: 400 1.05rem/1.7 Arial, Helvetica, sans-serif;
      }

      .figure {
        margin-top: 32px;
        padding-top: 8px;
      }

      .figure-grid {
        display: grid;
        grid-template-columns: repeat(2, auto);
        gap: 16px 24px;
        justify-content: center;
      }

      .figure-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .figure-frame {
        width: 300px;
        height: 300px;
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 4px;
        overflow: hidden;
        background: #0b1e4a;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .figure-frame video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0b1e4a;
        cursor: pointer;
      }

      .figure-label {
        margin: 0;
        font: 400 0.95rem/1.4 Arial, Helvetica, sans-serif;
        color: var(--text);
        text-align: center;
      }

      .figure-caption {
        margin: 22px 0 0;
        color: var(--muted);
        font: 400 0.92rem/1.65 Arial, Helvetica, sans-serif;
        text-align: justify;
      }

      .figure-caption strong {
        color: var(--text);
        font-weight: 600;
      }

      @media (max-width: 640px) {
        .figure-grid {
          grid-template-columns: 1fr;
        }

        .hero-top {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="hero-top">
          <span>Lightweight Visual Frontend</span>
          <span>Attention visualization</span>
        </div>
        <div class="hero-body">
          <h1>Spatial Attention Maps</h1>
          <p class="lead">
            Visualizations from four attention heads in the lightweight visual frontend.
            Each panel shows spatial attention over the lip region of interest.
          </p>

          <figure class="figure">
            <div class="figure-grid">
              <div class="figure-item">
                <div class="figure-frame">
                  <video
                    class="attention-video"
                    autoplay
                    muted
                    loop
                    playsinline
                    controls
                    preload="auto"
                    aria-label="Spatial attention map for attention head 1"
                  >
                    <source src="assets/videos/S50001_mask0.mp4" type="video/mp4" />
                  </video>
                </div>
                <p class="figure-label">(a) Head 1</p>
              </div>
              <div class="figure-item">
                <div class="figure-frame">
                  <video
                    class="attention-video"
                    autoplay
                    muted
                    loop
                    playsinline
                    controls
                    preload="auto"
                    aria-label="Spatial attention map for attention head 2"
                  >
                    <source src="assets/videos/S50001_mask1.mp4" type="video/mp4" />
                  </video>
                </div>
                <p class="figure-label">(b) Head 2</p>
              </div>
              <div class="figure-item">
                <div class="figure-frame">
                  <video
                    class="attention-video"
                    autoplay
                    muted
                    loop
                    playsinline
                    controls
                    preload="auto"
                    aria-label="Spatial attention map for attention head 3"
                  >
                    <source src="assets/videos/S50001_mask2.mp4" type="video/mp4" />
                  </video>
                </div>
                <p class="figure-label">(c) Head 3</p>
              </div>
              <div class="figure-item">
                <div class="figure-frame">
                  <video
                    class="attention-video"
                    autoplay
                    muted
                    loop
                    playsinline
                    controls
                    preload="auto"
                    aria-label="Spatial attention map for attention head 4"
                  >
                    <source src="assets/videos/S50001_mask3.mp4" type="video/mp4" />
                  </video>
                </div>
                <p class="figure-label">(d) Head 4</p>
              </div>
            </div>
            <figcaption class="figure-caption">
              <strong>Fig. 1:</strong> Spatial attention maps from 4 attention heads.
              The 11&nbsp;&times;&nbsp;11 feature maps are bilinearly upsampled to the
              original 88&nbsp;&times;&nbsp;88 lip ROI for visualization.
            </figcaption>
          </figure>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var videos = Array.prototype.slice.call(
          document.querySelectorAll(".attention-video")
        );

        function playVideo(video) {
          if (!video || video.readyState < 2) return;
          var promise = video.play();
          if (promise && typeof promise.catch === "function") {
            promise.catch(function () {
              /* Autoplay may be blocked until user interaction. */
            });
          }
        }

        function playAll() {
          videos.forEach(playVideo);
        }

        videos.forEach(function (video) {
          video.muted = true;
          video.defaultMuted = true;
          video.setAttribute("muted", "");

          ["loadeddata", "canplay"].forEach(function (eventName) {
            video.addEventListener(eventName, function () {
              playVideo(video);
            });
          });

          video.addEventListener("click", function () {
            if (video.paused) {
              playVideo(video);
            }
          });
        });

        playAll();

        if ("IntersectionObserver" in window) {
          var observer = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  playVideo(entry.target);
                }
              });
            },
            { threshold: 0.2 }
          );
          videos.forEach(function (video) {
            observer.observe(video);
          });
        }

        ["pointerdown", "touchstart", "keydown"].forEach(function (eventName) {
          document.addEventListener(
            eventName,
            function () {
              playAll();
            },
            { once: true, passive: true }
          );
        });
      })();
    </script>
  </body>
</html>
